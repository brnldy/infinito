<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador â€” PP Playground VF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f4;
  --surface:#ffffff;
  --border:#e2e5e9;
  --accent:#ac1313;
  --text:#1a1a1a;
  --muted:#7a8390;
  --radius:12px;
}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 16px 60px;gap:16px;
}
header{display:flex;flex-direction:column;align-items:center;gap:4px}
header h1{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
header p{font-size:11px;color:var(--muted)}
.card{
  width:100%;max-width:800px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.lbl{
  font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--muted);display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.lbl .v{color:var(--accent);font-family:monospace;font-size:11px}
textarea{
  width:100%;min-height:64px;
  background:#f8f9fa;border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:15px;resize:vertical;
  outline:none;transition:border-color .18s;
}
textarea:focus{border-color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;height:4px}
input[type=color]{
  width:44px;height:34px;border:1px solid var(--border);
  border-radius:7px;cursor:pointer;padding:3px;background:#f8f9fa;
}
.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:120px}
select{
  background:#f8f9fa;color:var(--text);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;font-size:13px;outline:none;cursor:pointer;width:100%;
}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{
  display:inline-flex;flex-direction:column;align-items:center;gap:2px;
  background:#f0f2f4;color:var(--muted);border:1.5px solid var(--border);
  border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s;user-select:none;line-height:1;
}
.chip small{font-size:9px;font-weight:400;opacity:.8;letter-spacing:.03em}
.chip:hover{border-color:#aaa;color:var(--text)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.on small{opacity:.85}
.preview-outer{
  width:100%;max-width:800px;
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.preview-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
}
.preview-bar span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.preview-viewport{position:relative;overflow:hidden;width:100%}
#preview-div{
  transform-origin:top left;
  white-space:pre;
  font-family:'PPPlayground',sans-serif;
  word-break:keep-all;
  display:block;
}
.actions{width:100%;max-width:800px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn:active{transform:scale(.96);opacity:.85}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.font-note{font-size:11px;color:var(--muted);flex:1}
@media(max-width:480px){.card{padding:16px}.chip{padding:4px 8px}}
</style>
</head>
<body>
<header>
  <h1>Gerador de Texto</h1>
  <p>PP Playground VF &mdash; exporta sempre 1920px, fundo transparente</p>
</header>

<div class="card">
  <div>
    <div class="lbl">Texto</div>
    <textarea id="txt">Infinito</textarea>
  </div>

  <div>
    <div class="lbl">Peso <span class="v" id="wg-v">400</span></div>
    <input type="range" id="wg" min="100" max="900" step="1" value="400">
  </div>

  <div>
    <div class="lbl">Ligaduras</div>
    <div class="chips">
      <button class="chip on" data-f="liga">liga<small>PadrÃ£o</small></button>
      <button class="chip" data-f="dlig">dlig<small>Especiais</small></button>
      <button class="chip on" data-f="calt">calt<small>Contextuais</small></button>
      <button class="chip" data-f="swsh">swsh<small>Floreados</small></button>
    </div>
  </div>

  <div>
    <div class="lbl">VariaÃ§Ãµes EstilÃ­sticas</div>
    <div class="chips">
      <button class="chip" data-f="ss01">SS01</button>
      <button class="chip" data-f="ss02">SS02</button>
      <button class="chip" data-f="ss03">SS03</button>
      <button class="chip" data-f="ss04">SS04</button>
      <button class="chip" data-f="ss05">SS05</button>
      <button class="chip" data-f="ss06">SS06</button>
      <button class="chip" data-f="ss07">SS07</button>
      <button class="chip" data-f="ss08">SS08</button>
      <button class="chip" data-f="ss09">SS09</button>
      <button class="chip" data-f="ss10">SS10</button>
      <button class="chip" data-f="case">CASE<small>MaiÃºsc.</small></button>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <div class="lbl">Cor do texto</div>
      <input type="color" id="tc" value="#ac1313">
    </div>
    <div class="col" style="min-width:180px">
      <div class="lbl">Fundo <span class="v" style="font-size:10px">(sÃ³ no preview)</span></div>
      <input type="color" id="bgc" value="#8ea3b6">
    </div>
    <div class="col">
      <div class="lbl">Alinhamento</div>
      <select id="align">
        <option value="center">Centro</option>
        <option value="left">Esquerda</option>
        <option value="right">Direita</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <div class="lbl">Entrelinha <span class="v" id="lh-v">1.10</span></div>
      <input type="range" id="lh" min="0.5" max="3" step="0.05" value="1.1">
    </div>
    <div class="col">
      <div class="lbl">Padding <span class="v" id="pd-v">80</span>px</div>
      <input type="range" id="pd" min="0" max="400" value="80">
    </div>
  </div>
</div>

<div class="preview-outer">
  <div class="preview-bar">
    <span>Preview â€” 1920px</span>
    <span id="dim-info">â€”</span>
  </div>
  <div class="preview-viewport" id="preview-vp">
    <div id="preview-div">Infinito</div>
  </div>
</div>

<div class="actions">
  <button class="btn" id="dl-btn">&#8595; Baixar PNG</button>
  <button class="btn btn-ghost" id="cp-btn">Copiar</button>
  <span class="font-note" id="font-note">Carregando fonte...</span>
</div>

  if(!keys.length)return"normal";
  return keys.map(function(k){return'"'+k+'" 1'}).join(", ");
}

/* Calculates the font-size (px) that makes the widest line = EXPORT_W - padding*2 */
function calcFontSize(text,weight,padding){
  var lines=(text||"").split("\n").filter(function(l){return l.trim();});
  if(!lines.length)return 200;
  var tmp=document.createElement("canvas");
  var ctx=tmp.getContext("2d");
  var REF=100;
  ctx.font=weight+" "+REF+"px PPPlayground, sans-serif";
  var maxW=Math.max.apply(null,lines.map(function(l){return ctx.measureText(l).width;}));
  if(!maxW)return 200;
  var available=EXPORT_W-padding*2;
  return Math.max(8,Math.floor(available/maxW*REF));
}

/* â”€â”€ Bind controls â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function bindRange(id,outId,dec){
  var el=$i(id),out=$i(outId);
  el.addEventListener("input",function(){
    out.textContent=dec?parseFloat(el.value).toFixed(2):el.value;render();
  });
}
bindRange("wg","wg-v");
bindRange("lh","lh-v",true);
bindRange("pd","pd-v");

["txt","tc","bgc","align"].forEach(function(id){
  $i(id).addEventListener("input",render);
  $i(id).addEventListener("change",render);
});

document.querySelectorAll(".chip").forEach(function(c){
  c.addEventListener("click",function(){
    var f=c.dataset.f;
    if(activeFeatures[f]!==undefined){delete activeFeatures[f];c.classList.remove("on");}
    else{activeFeatures[f]=1;c.classList.add("on");}
    render();
  });
});

/* â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
var raf=null;
function render(){if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(_render);}

function _render(){
  var text=$i("txt").value||"";
  var weight=+$i("wg").value;
  var textColor=$i("tc").value;
  var bgColor=$i("bgc").value;
  var textAlign=$i("align").value;
  var lineHeight=parseFloat($i("lh").value);
  var padding=+$i("pd").value;
  var features=featureCSS();

  var fontSize=calcFontSize(text,weight,padding);
  var rawLines=text.split("\n");
  var lineH=fontSize*lineHeight;
  var H=Math.ceil(rawLines.length*lineH+padding*2);

  var pd=$i("preview-div"),vp=$i("preview-vp");

  /* Set div to full 1920px then scale to viewport */
  pd.style.transform="none";
  pd.style.width=EXPORT_W+"px";
  pd.style.height=H+"px";
  pd.style.fontSize=fontSize+"px";
  pd.style.fontWeight=weight;
  pd.style.color=textColor;
  pd.style.fontFeatureSettings=features;
  pd.style.lineHeight=lineHeight;
  pd.style.padding=padding+"px";
  pd.style.textAlign=textAlign;
  pd.style.backgroundColor=bgColor;
  pd.style.whiteSpace="pre";
  pd.textContent=text;

  requestAnimationFrame(function(){
    var vpW=(vp.clientWidth||760)-2;
    var scale=vpW/EXPORT_W;
    pd.style.transform="scale("+scale+")";
    pd.style.transformOrigin="top left";
    vp.style.height=(H*scale)+"px";
    $i("dim-info").textContent=EXPORT_W+" Ã— "+H+" px  |  font "+fontSize+"px";
  });
}

/* â”€â”€ Export canvas â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function buildExportCanvas(cb){
  var text=$i("txt").value||"";
  var weight=+$i("wg").value;
  var textColor=$i("tc").value;
  var textAlign=$i("align").value;
  var lineHeight=parseFloat($i("lh").value);
  var padding=+$i("pd").value;

  var W=EXPORT_W;
  var fontSize=calcFontSize(text,weight,padding);
  var rawLines=text.split("\n");
  var lineH=fontSize*lineHeight;
  var H=Math.ceil(rawLines.length*lineH+padding*2);

  var cvs=document.createElement("canvas");
  cvs.width=W;cvs.height=H;
  var ctx=cvs.getContext("2d");
  /* NO background fill â€” transparent PNG */
  ctx.font=weight+" "+fontSize+"px PPPlayground, sans-serif";
  ctx.fillStyle=textColor;
  ctx.textBaseline="top";
  ctx.textAlign=textAlign;

  var x=textAlign==="center"?W/2:textAlign==="right"?W-padding:padding;
  var y=padding;
  rawLines.forEach(function(line){
    if(line)ctx.fillText(line,x,y);
    y+=lineH;
  });

  cb(cvs);
}

/* â”€â”€ Modal (usa Blob URL â€” sem limite de tamanho no iOS) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function showImgModal(blob){
  var blobURL=URL.createObjectURL(blob);
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;";
  var msg=document.createElement("p");
  msg.style.cssText="color:#fff;font-size:13px;text-align:center;max-width:320px;line-height:1.6;";
  msg.textContent="iPhone: pressione e segure a imagem \u2192 Salvar na Fotos.\nPC: clique direito \u2192 Copiar imagem.";
  var img=document.createElement("img");
  img.src=blobURL;
  img.style.cssText="max-width:100%;max-height:60dvh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);display:block;";
  img.addEventListener("click",function(e){e.stopPropagation();});
  var close=document.createElement("button");
  close.textContent="Fechar";
  close.style.cssText="background:#fff;color:#111;border:none;border-radius:8px;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;";
  function closeIt(){URL.revokeObjectURL(blobURL);if(ov.parentNode)ov.parentNode.removeChild(ov);}
  close.addEventListener("click",function(e){e.stopPropagation();closeIt();});
  ov.addEventListener("click",closeIt);
  ov.appendChild(msg);ov.appendChild(img);ov.appendChild(close);
  document.body.appendChild(ov);
}

/* â”€â”€ Download â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
$i("dl-btn").addEventListener("click",function(){
  buildExportCanvas(function(cvs){
    cvs.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.download="ppplayground-1920.png";
      a.href=url;
      a.click();
      setTimeout(function(){URL.revokeObjectURL(url);},2000);
    },"image/png");
  });
});

/* â”€â”€ Copy â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
$i("cp-btn").addEventListener("click",function(){
  buildExportCanvas(function(cvs){
    cvs.toBlob(function(blob){
      if(navigator.clipboard&&window.ClipboardItem){
        navigator.clipboard.write([new ClipboardItem({"image/png":blob})])
          .then(function(){
            var b=$i("cp-btn"),o=b.textContent;
            b.textContent="Copiado!";setTimeout(function(){b.textContent=o;},1500);
          })
          .catch(function(){showImgModal(blob);});
      }else{
        showImgModal(blob);
      }
    },"image/png");
  });
});

document.fonts.ready.then(render);
window.addEventListener("resize",render);
</script>
